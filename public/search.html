<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索词条 - VocaloWiki</title>
    <meta name="description" content="在VocaloWiki搜索VOCALOID相关的虚拟歌手，音乐作品和创作者信息">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏容器 -->
    <div id="navbar-container"></div>

    <!-- 搜索区域 -->
    <section class="search-section">
        <div class="search-section-content">
            <h2 id="wiki-home-title">探索 VOCALOID 世界</h2>
            <div class="search-form">
                <input type="text" class="search-input" id="search-input" placeholder="搜索虚拟歌手，音乐作品、创作者...">
                <button class="btn btn-primary" onclick="doSearch()">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    搜索
                </button>
            </div>
            <div class="category-tags">
                <span class="category-tag active">全部</span>
                <span class="category-tag">初音未来</span>
                <span class="category-tag">镜音铃</span>
                <span class="category-tag">GUMI</span>
                <span class="category-tag">洛天依</span>
                <span class="category-tag">音乐作品</span>
            </div>
        </div>
    </section>

    <!-- 搜索结果 -->
    <section class="search-page">
        <div class="container">
            <div id="search-status" class="card" style="margin-bottom:20px;padding:15px 20px;"></div>
            <div id="search-results" class="search-results"></div>
            <div class="pagination" id="pagination"></div>
        </div>
    </section>

    <!-- 页脚容器 -->
    <div id="footer-container"></div>

    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>

    <script src="js/api.js"></script>
    <script src="js/wiki-settings.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/components.js"></script>
    <script>
        let currentPage = 1;
        let keyword = '';
        let selectedTagId = null;
        let availableTags = [];
        const pageSize = 10;

        // 从Markdown内容中提取第一张图片
        function extractFirstImage(content) {
            if (!content) return '';
            // 匹配 Markdown 图片语法 ![alt](url) 或 ![](url)
            const match = content.match(/!\[.*?\]\((.*?)\)/);
            return match ? match[1] : '';
        }

        // 加载词条标签
        async function loadTags() {
            try {
                const result = await API.getArticleTags();
                if (result.success && result.data) {
                    availableTags = result.data;
                    renderTagFilters();
                }
            } catch (error) {
                console.error('加载标签失败:', error);
            }
        }

        // 渲染标签筛选器
        function renderTagFilters() {
            const container = document.querySelector('.category-tags');
            if (!container) return;
            
            const allBtn = `<span class="category-tag ${selectedTagId === null ? 'active' : ''}" onclick="filterByTag(null)">全部</span>`;
            const tagBtns = availableTags.map(tag => `
                <span class="category-tag ${selectedTagId === tag.ID ? 'active' : ''}" 
                      style="${selectedTagId === tag.ID ? '' : 'border-color:' + tag.color + '40'}"
                      onclick="filterByTag(${tag.ID}, '${escapeHtml(tag.name)}', '${tag.color}')">
                    ${escapeHtml(tag.name)}
                </span>
            `).join('');
            
            container.innerHTML = allBtn + tagBtns;
        }

        // 按标签筛选
        async function filterByTag(tagId, tagName, tagColor) {
            selectedTagId = tagId;
            renderTagFilters();
            
            const container = document.getElementById('search-results');
            const statusEl = document.getElementById('search-status');
            
            container.innerHTML = '<div class="loading"></div>';
            
            if (tagId === null) {
                statusEl.textContent = '请输入关键词搜索词条';
                statusEl.style.color = 'var(--text-secondary)';
                container.innerHTML = '';
                return;
            }
            
            statusEl.textContent = `正在加载 "${escapeHtml(tagName)}" 标签的词条...`;
            statusEl.style.color = tagColor || 'var(--text-secondary)';

            try {
                const result = await API.getArticlesByTag(tagId, pageSize, 0);
                
                if (result.success && result.data && result.data.length > 0) {
                    statusEl.textContent = `找到 ${result.pagination?.total || result.data.length} 个 "${tagName}" 相关词条`;
                    statusEl.style.color = tagColor || 'var(--vocaloid-accent)';
                    renderSearchResults(result.data);
                } else {
                    statusEl.textContent = `暂无 "${tagName}" 相关词条`;
                    statusEl.style.color = 'var(--vocaloid-primary)';
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">
                                <svg width="80" height="80" fill="none" stroke="var(--text-muted)" stroke-width="1.5" viewBox="0 0 24 24">
                                    <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
                                    <line x1="7" y1="7" x2="7.01" y2="7"></line>
                                </svg>
                            </div>
                            <h3 class="empty-state-title">暂无相关词条</h3>
                            <p>成为第一位贡献者，创建 "${tagName}" 相关词条</p>
                            <a href="editor.html" class="btn btn-primary" style="margin-top:20px;">创建词条</a>
                        </div>
                    `;
                }
            } catch (error) {
                statusEl.textContent = '加载失败，请稍后重试';
                statusEl.style.color = 'var(--danger-color)';
            }
        }

        // 初始化页面组件
        function initPage() {
            const user = API.getCurrentUser();
            VocaloComponents.initPageComponents('standard', {
                activePage: 'search',
                user: user,
                showEditorBtn: !!user
            });
            return user;
        }

        // 登出
        function logout() {
            API.logout().then(() => {
                window.location.reload();
            });
        }

        // 执行搜索
        async function doSearch(page = 1) {
            keyword = document.getElementById('search-input').value.trim();
            if (!keyword) {
                showToast('请输入搜索关键词', 'error');
                return;
            }
            currentPage = page;
            
            const container = document.getElementById('search-results');
            const statusEl = document.getElementById('search-status');
            
            container.innerHTML = '<div class="loading"></div>';
            statusEl.textContent = `正在搜索 "${escapeHtml(keyword)}"...`;
            statusEl.style.color = 'var(--text-secondary)';

            try {
                const result = await API.searchArticles(keyword, pageSize, (page - 1) * pageSize);
                
                if (result.success && result.data && result.data.length > 0) {
                    statusEl.textContent = `找到 ${result.pagination?.total || result.data.length} 条关于 "${escapeHtml(keyword)}" 的结果`;
                    statusEl.style.color = 'var(--vocaloid-accent)';
                    renderSearchResults(result.data);
                    renderPagination(result.pagination?.total || result.data.length);
                } else {
                    statusEl.textContent = `未找到关于 "${escapeHtml(keyword)}" 的结果`;
                    statusEl.style.color = 'var(--vocaloid-primary)';
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">
                                <svg width="80" height="80" fill="none" stroke="var(--text-muted)" stroke-width="1.5" viewBox="0 0 24 24">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <path d="m21 21-4.35-4.35"></path>
                                </svg>
                            </div>
                            <h3 class="empty-state-title">没有找到相关词条</h3>
                            <p>换个关键词试试，或者成为第一位贡献者</p>
                            <a href="editor.html" class="btn btn-primary" style="margin-top:20px;">创建词条</a>
                        </div>
                    `;
                    document.getElementById('pagination').innerHTML = '';
                }
            } catch (error) {
                statusEl.textContent = '搜索失败，请稍后重试';
                statusEl.style.color = 'var(--danger-color)';
                container.innerHTML = '<div class="empty-state"><p>网络错误</p></div>';
            }
        }

        // 渲染搜索结果
        function renderSearchResults(articles) {
            const container = document.getElementById('search-results');
            container.innerHTML = '';
            
            articles.forEach(article => {
                const card = document.createElement('div');
                card.className = 'masonry-item';
                
                // 从Markdown内容中提取第一张图片作为封面
                const coverImg = extractFirstImage(article.content);
                const hasImage = coverImg && coverImg.trim();
                const imageHtml = hasImage 
                    ? `<img src="${escapeHtml(coverImg)}" alt="${escapeHtml(article.title)}" onerror="this.parentElement.innerHTML='<div class=\'article-card-placeholder\'><span class=\'placeholder-icon\'>🎵</span><span class=\'placeholder-text\'>${escapeHtml(article.title)}</span></div>'">`
                    : `<div class="article-card-placeholder"><span class="placeholder-icon">🎵</span><span class="placeholder-text">${escapeHtml(article.title)}</span></div>`;
                
                // 渲染标签
                let tagsHtml = '';
                if (article.tags && article.tags.length > 0) {
                    tagsHtml = '<div class="article-card-tags">';
                    article.tags.slice(0, 3).forEach(tag => {
                        tagsHtml += `<span class="article-card-tag" style="background:${tag.color}20;color:${tag.color};border-color:${tag.color}30;">${escapeHtml(tag.name)}</span>`;
                    });
                    tagsHtml += '</div>';
                }
                
                card.innerHTML = `
                    <div class="article-card" onclick="window.location.href='article.html?id=${article.ID}'">
                        <div class="article-card-image">
                            ${imageHtml}
                        </div>
                        <div class="article-card-content">
                            <h3 class="article-card-title">${escapeHtml(article.title)}</h3>
                            <div class="article-card-meta">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                    <line x1="3" y1="10" x2="21" y2="10"></line>
                                </svg>
                                ${formatDate(article.create_date)}
                            </div>
                            <p class="article-card-sketch">${escapeHtml(article.sketch || '暂无简介')}</p>
                            ${tagsHtml}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 渲染分页
        function renderPagination(total) {
            const container = document.getElementById('pagination');
            const totalPages = Math.ceil(total / pageSize);
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = `
                <button ${currentPage === 1 ? 'disabled' : ''} onclick="doSearch(${currentPage - 1})">上一页</button>
            `;

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="${i === currentPage ? 'active' : ''}" onclick="doSearch(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += '<span>...</span>';
                }
            }

            html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="doSearch(${currentPage + 1})">下一页</button>`;
            container.innerHTML = html;
        }

        // 显示提示
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast toast-${type}`;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 移动端菜单切换
        function toggleMobileMenu() {
            const navLinks = document.getElementById('nav-links');
            navLinks.classList.toggle('show');
        }

        // HTML转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN');
        }

        // 回车搜索
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                doSearch();
            }
        });

        // 分类标签点击
        document.querySelectorAll('.category-tag').forEach(tag => {
            tag.addEventListener('click', () => {
                document.querySelectorAll('.category-tag').forEach(t => t.classList.remove('active'));
                tag.classList.add('active');
                const text = tag.textContent;
                if (text !== '全部') {
                    document.getElementById('search-input').value = text;
                    doSearch();
                }
            });
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', async () => {
            // 先初始化组件
            initPage();
            // 再加载百科设置
            await loadWikiSettings();
            // 加载标签
            loadTags();
            
            // 获取URL参数
            const urlParams = new URLSearchParams(window.location.search);
            const q = urlParams.get('q');
            const tagId = urlParams.get('tag');
            
            if (tagId) {
                // 如果URL中有tag参数，先找到对应的标签名
                filterByTag(parseInt(tagId), '标签', '#808080');
            } else if (q) {
                document.getElementById('search-input').value = q;
                doSearch();
            }
        });
    </script>
</body>
</html>
