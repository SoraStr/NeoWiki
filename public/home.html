<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>探索 - VocaloWiki</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏容器 -->
    <div id="navbar-container"></div>

    <!-- 标语区域 -->
    <section class="search-section">
        <div class="container">
            <h1 id="wiki-home-title" style="text-align:center;">探索 VOCALOID 世界</h1>
        </div>
    </section>

    <!-- 词条列表 -->
    <section class="content-section">
        <div class="container">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;">
                <h2 style="display:flex;align-items:center;gap:10px;">
                    <span>🎶</span> 词条推荐
                </h2>
                <button class="btn btn-outline btn-sm" onclick="loadArticles()">🔄 刷新</button>
            </div>
            <div id="articles-container" class="masonry">
                <div class="loading"></div>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </section>

    <!-- 页脚容器 -->
    <div id="footer-container"></div>

    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>

    <script src="js/api.js"></script>
    <script src="js/wiki-settings.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/components.js"></script>
    <script>
        let currentPage = 1;
        const pageSize = 12;

        // 初始化页面组件
        function initPage() {
            const user = API.getCurrentUser();
            VocaloComponents.initPageComponents('standard', {
                activePage: 'home',
                user: user,
                showEditorBtn: !!user
            });
            return user;
        }

        // 登出
        function logout() {
            API.logout().then(() => {
                showToast('已安全登出', 'success');
                setTimeout(() => {
                    window.location.reload();
                }, 1000);
            });
        }

        // 从Markdown内容中提取第一张图片
        function extractFirstImage(content) {
            if (!content) return '';
            // 匹配 Markdown 图片语法 ![alt](url) 或 ![](url)
            const match = content.match(/!\[.*?\]\((.*?)\)/);
            return match ? match[1] : '';
        }

        // 加载词条列表
        async function loadArticles(page = 1) {
            const container = document.getElementById('articles-container');
            container.innerHTML = '<div class="loading"></div>';
            currentPage = page;

            try {
                const result = await API.getArticles({
                    limit: pageSize,
                    offset: (page - 1) * pageSize,
                    orderBy: 'update_date',
                    orderDir: 'DESC'
                });

                if (result.success && result.data && result.data.length > 0) {
                    container.innerHTML = '';
                    result.data.forEach(article => {
                        const card = document.createElement('div');
                        card.className = 'masonry-item';
                        
                        // 从Markdown内容中提取第一张图片作为封面
                        const coverImg = extractFirstImage(article.content);
                        const hasImage = coverImg && coverImg.trim();
                        const imageHtml = hasImage 
                            ? `<img src="${escapeHtml(coverImg)}" alt="${escapeHtml(article.title)}" onerror="this.parentElement.innerHTML='<div class=\'article-card-placeholder\'><span class=\'placeholder-icon\'>🎵</span><span class=\'placeholder-text\'>${escapeHtml(article.title)}</span></div>'">`
                            : `<div class="article-card-placeholder"><span class="placeholder-icon">🎵</span><span class="placeholder-text">${escapeHtml(article.title)}</span></div>`;
                        
                        // 渲染标签
                        let tagsHtml = '';
                        if (article.tags && article.tags.length > 0) {
                            tagsHtml = '<div class="article-card-tags">';
                            article.tags.slice(0, 3).forEach(tag => {
                                tagsHtml += `<span class="article-card-tag" style="background:${tag.color}20;color:${tag.color};border-color:${tag.color}30;">${escapeHtml(tag.name)}</span>`;
                            });
                            tagsHtml += '</div>';
                        }
                        
                        card.innerHTML = `
                            <div class="article-card" onclick="window.location.href='article.html?id=${article.ID}'">
                                <div class="article-card-image">
                                    ${imageHtml}
                                </div>
                                <div class="article-card-content">
                                    <h3 class="article-card-title">${escapeHtml(article.title)}</h3>
                                    <div class="article-card-meta">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                            <line x1="16" y1="2" x2="16" y2="6"></line>
                                            <line x1="8" y1="2" x2="8" y2="6"></line>
                                            <line x1="3" y1="10" x2="21" y2="10"></line>
                                        </svg>
                                        ${formatDate(article.create_date)}
                                    </div>
                                    <p class="article-card-sketch">${escapeHtml(article.sketch || '暂无简介')}</p>
                                    ${tagsHtml}
                                </div>
                            </div>
                        `;
                        container.appendChild(card);
                    });

                    // 渲染分页
                    renderPagination(result.pagination?.total || result.data.length);
                } else {
                    container.innerHTML = `
                        <div class="empty-state" style="width:100%;">
                            <div class="empty-state-icon">🎵</div>
                            <h3 class="empty-state-title">暂无词条</h3>
                            <p>成为第一位贡献者，创建第一个 VOCALOID 词条吧！</p>
                            <a href="editor.html" class="btn btn-primary" style="margin-top:20px;">✏️ 创建词条</a>
                        </div>
                    `;
                }
            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state" style="width:100%;">
                        <div class="empty-state-icon">⚠️</div>
                        <h3 class="empty-state-title">加载失败</h3>
                        <p>请检查数据库连接</p>
                    </div>
                `;
            }
        }

        // 渲染分页
        function renderPagination(total) {
            const container = document.getElementById('pagination');
            const totalPages = Math.ceil(total / pageSize);
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = `
                <button ${currentPage === 1 ? 'disabled' : ''} onclick="loadArticles(${currentPage - 1})">← 上一页</button>
            `;

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="${i === currentPage ? 'active' : ''}" onclick="loadArticles(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += '<span>...</span>';
                }
            }

            html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="loadArticles(${currentPage + 1})">下一页 →</button>`;
            container.innerHTML = html;
        }

        // 显示提示
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast toast-${type}`;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 移动端菜单切换
        function toggleMobileMenu() {
            const navLinks = document.getElementById('nav-links');
            navLinks.classList.toggle('show');
        }

        // HTML转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN');
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', async () => {
            // 先初始化组件（同步渲染导航栏）
            initPage();
            // 再加载百科设置（更新logo等）
            await loadWikiSettings();
            // 加载词条
            loadArticles();

        });
    </script>
</body>
</html>
