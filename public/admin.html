<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - VocaloWiki</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏容器 -->
    <div id="navbar-container"></div>

    <!-- 管理页面 -->
    <section class="admin-page">
        <div class="container">
            <h1 style="margin-bottom:30px;">管理后台</h1>

            <!-- 统计卡片 -->
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:30px;">
                <div class="card">
                    <h3 style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:10px;">词条总数</h3>
                    <p style="font-size:2rem;font-weight:700;color:var(--vocaloid-primary);" id="stat-articles">-</p>
                </div>
                <div class="card">
                    <h3 style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:10px;">用户总数</h3>
                    <p style="font-size:2rem;font-weight:700;color:var(--vocaloid-secondary);" id="stat-users">-</p>
                </div>
                <div class="card">
                    <h3 style="color:#64748b;font-size:0.9rem;margin-bottom:10px;">活跃用户</h3>
                    <p style="font-size:2rem;font-weight:700;color:#22c55e;" id="stat-active">-</p>
                </div>
            </div>

            <!-- 标签切换 -->
            <div class="admin-tabs">
                <button class="admin-tab active" data-tab="settings">百科设置</button>
                <button class="admin-tab" data-tab="users">用户管理</button>
                <button class="admin-tab" data-tab="articles">词条管理</button>
                <button class="admin-tab" data-tab="article-tags">词条标签</button>
                <button class="admin-tab" data-tab="user-tags">用户标签</button>
            </div>

            <!-- 百科设置 -->
            <div id="settings-panel">
                <div class="card" style="margin-bottom:20px;">
                    <h3 style="margin-bottom:15px;">百科信息设置</h3>
                    <form id="wiki-settings-form" style="display:flex;flex-direction:column;gap:15px;">
                        <div class="form-group" style="margin-bottom:0;">
                            <label class="form-label">百科名称</label>
                            <input type="text" class="form-input" id="wiki-name-input" placeholder="请输入百科名称" required>
                        </div>
                        <div class="form-group" style="margin-bottom:0;">
                            <label class="form-label">首页标语</label>
                            <input type="text" class="form-input" id="wiki-home-title-input" placeholder="例如：探索VOCALOID世界">
                            <span class="form-hint" style="font-size:0.8rem;color:var(--text-muted);margin-top:4px;">显示在首页搜索区域上方</span>
                        </div>
                        <div class="form-group" style="margin-bottom:0;">
                            <label class="form-label">百科简介</label>
                            <textarea class="form-input" id="wiki-desc-input" placeholder="请输入百科简介" rows="3"></textarea>
                        </div>
                        <div class="form-group" style="margin-bottom:0;">
                            <label class="form-label">Logo设置</label>
                            <div style="display:flex;gap:15px;align-items:flex-start;flex-wrap:wrap;">
                                <div style="flex:1;min-width:200px;">
                                    <label class="form-label" style="font-size:0.85rem;color:var(--text-muted);margin-bottom:8px;">Logo类型</label>
                                    <div style="display:flex;gap:10px;">
                                        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                                            <input type="radio" name="logo-type" value="emoji" id="logo-type-emoji" checked onchange="toggleLogoType()">
                                            Emoji图标
                                        </label>
                                        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                                            <input type="radio" name="logo-type" value="image" id="logo-type-image" onchange="toggleLogoType()">
                                            图片链接
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="form-group" id="logo-emoji-section" style="margin-bottom:0;">
                            <label class="form-label">选择Emoji图标</label>
                            <div id="emoji-picker" style="display:flex;flex-wrap:wrap;gap:8px;padding:10px;background:var(--bg-tertiary);border-radius:var(--radius);max-height:150px;overflow-y:auto;">
                                <!-- Emojis will be populated by JavaScript -->
                            </div>
                            <input type="hidden" id="wiki-logo-emoji" value="🎵">
                        </div>
                        <div class="form-group" id="logo-image-section" style="margin-bottom:0;display:none;">
                            <label class="form-label">Logo图片URL</label>
                            <input type="text" class="form-input" id="wiki-logo-image" placeholder="请输入Logo图片链接">
                        </div>
                        <div class="form-group" style="margin-bottom:0;">
                            <label class="form-label">Logo预览</label>
                            <div id="logo-preview" style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg-tertiary);border-radius:var(--radius);">
                                <span id="logo-preview-icon" style="font-size:2rem;">🎵</span>
                                <span id="logo-preview-text" style="font-size:1.5rem;font-weight:600;background:var(--vocaloid-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">百科</span>
                            </div>
                        </div>
                        <div class="form-group" style="margin-bottom:0;">
                            <label class="form-label">内容体系标题</label>
                            <input type="text" class="form-input" id="wiki-features-title-input" placeholder="例如：📚 内容体系">
                            <span class="form-hint" style="font-size:0.8rem;color:var(--text-muted);margin-top:4px;">显示在首页内容体系区域上方</span>
                        </div>
                        <div class="form-group" style="margin-bottom:0;">
                            <label class="form-label">功能卡片</label>
                            <div id="features-cards-container">
                                <!-- 功能卡片由 JS 动态渲染 -->
                            </div>
                            <button type="button" class="btn btn-outline" style="margin-top:10px;" onclick="addFeatureCard()">+ 添加卡片</button>
                        </div>
                        <div>
                            <button type="submit" class="btn btn-primary">保存设置</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- 用户管理 -->
            <div id="users-panel" style="display:none;">
                <div style="margin-bottom:20px;">
                    <button class="btn btn-primary" onclick="loadUsers()">刷新列表</button>
                </div>
                <table class="admin-table" id="users-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>用户名</th>
                            <th>昵称</th>
                            <th>角色</th>
                            <th>状态</th>
                            <th>用户标签</th>
                            <th>标签授权</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody">
                        <tr><td colspan="8"><div class="loading"></div></td></tr>
                    </tbody>
                </table>
            </div>

            <!-- 词条管理 -->
            <div id="articles-panel" style="display:none;">
                <div style="margin-bottom:20px;">
                    <button class="btn btn-primary" onclick="loadArticles()">刷新列表</button>
                </div>
                <table class="admin-table" id="articles-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>标题</th>
                            <th>创建时间</th>
                            <th>作者</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="articles-tbody">
                        <tr><td colspan="5"><div class="loading"></div></td></tr>
                    </tbody>
                </table>
            </div>

            <!-- 词条标签管理 -->
            <div id="article-tags-panel" style="display:none;">
                <div class="card" style="margin-bottom:20px;">
                    <h3 style="margin-bottom:15px;">创建新词条标签</h3>
                    <form id="create-article-tag-form" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
                        <input type="text" class="form-input" id="new-article-tag-name" placeholder="标签名称" style="width:150px;" required>
                        <input type="text" class="form-input" id="new-article-tag-desc" placeholder="标签描述" style="flex:1;">
                        <input type="color" id="new-article-tag-color" value="#808080" style="width:50px;height:40px;border:none;cursor:pointer;">
                        <button type="submit" class="btn btn-primary">创建</button>
                    </form>
                </div>
                <div id="article-tags-list">
                    <div class="loading"></div>
                </div>
            </div>

            <!-- 用户标签管理 -->
            <div id="user-tags-panel" style="display:none;">
                <div class="card" style="margin-bottom:20px;">
                    <h3 style="margin-bottom:15px;">创建新用户标签</h3>
                    <form id="create-user-tag-form" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
                        <input type="text" class="form-input" id="new-user-tag-name" placeholder="标签名称" style="width:150px;" required>
                        <input type="text" class="form-input" id="new-user-tag-desc" placeholder="标签描述" style="flex:1;">
                        <input type="color" id="new-user-tag-color" value="#808080" style="width:50px;height:40px;border:none;cursor:pointer;">
                        <button type="submit" class="btn btn-primary">创建</button>
                    </form>
                </div>
                <div id="user-tags-list">
                    <div class="loading"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 VocaloWiki - VOCALOID领域百科全书</p>
        </div>
    </footer>

    <!-- 确认模态框 -->
    <div class="modal-overlay" id="confirm-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">确认操作</h3>
                <button class="modal-close" onclick="closeConfirmModal()">&times;</button>
</div>
            <p id="confirm-message" style="margin-bottom:20px;"></p>
            <div style="display:flex;gap:10px;justify-content:flex-end;">
                <button class="btn btn-outline" onclick="closeConfirmModal()">取消</button>
                <button class="btn btn-danger" id="confirm-btn">确认</button>
            </div>
        </div>
    </div>

    <!-- 用户标签授权模态框 -->
    <div class="modal-overlay" id="user-tags-modal">
        <div class="modal" style="max-width:500px;">
            <div class="modal-header">
                <h3 class="modal-title" id="user-tags-modal-title">授权用户标签</h3>
                <button class="modal-close" onclick="closeUserTagsModal()">&times;</button>
            </div>
            <div style="margin-bottom:20px;">
                <p id="user-tags-modal-user" style="color:#64748b;margin-bottom:15px;"></p>
                <div id="user-tags-checkboxes" style="display:flex;flex-wrap:wrap;gap:10px;"></div>
            </div>
            <div style="display:flex;gap:10px;justify-content:flex-end;">
                <button class="btn btn-outline" onclick="closeUserTagsModal()">取消</button>
                <button class="btn btn-primary" onclick="saveUserTags()">保存</button>
            </div>
        </div>
    </div>

    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>

    <script src="js/api.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/wiki-settings.js"></script>
    <script src="js/components.js"></script>
    <script>
        let pendingAction = null;
        let currentUserId = null;
        let availableUserTags = [];

        // 初始化页面组件
        function initPage() {
            const user = API.getCurrentUser();
            if (!user) {
                window.location.href = '/login.html';
                return;
            }
            if (user.role !== 'admin') {
                showToast('需要管理员权限', 'error');
                setTimeout(() => {
                    window.location.href = '/home.html';
                }, 1000);
                return;
            }
            VocaloComponents.initPageComponents('standard', {
                activePage: 'admin',
                user: user,
                showEditorBtn: true
            });
            return user;
        }

        // Emoji列表
        const EMOJI_LIST = ['🎵', '🎶', '🎤', '🎧', '🎹', '🎸', '🎺', '🎷', '📚', '📖', '🎓', '🔍', '✨', '🌟', '💫', '⭐', '🌈', '🎨', '🎭', '🎪', '🎯', '🎲', '🎮', '🎬', '🎥', '📷', '🎙️', '📺', '🌐', '💡', '🔮', '🎁', '🏆', '🎊', '🎉', '💖', '🔥', '⚡', '💎', '🌸', '🌺'];

        // 初始化Emoji选择器
        function initEmojiPicker() {
            const container = document.getElementById('emoji-picker');
            if (!container) return;
            
            container.innerHTML = EMOJI_LIST.map(emoji => `
                <span class="emoji-option" data-emoji="${emoji}" 
                      style="font-size:1.5rem;cursor:pointer;padding:4px;border-radius:6px;transition:all 0.2s;"
                      onclick="selectEmoji('${emoji}')">${emoji}</span>
            `).join('');
            
            // 添加选中样式
            const style = document.createElement('style');
            style.textContent = `
                .emoji-option:hover { background: var(--bg-secondary); transform: scale(1.2); }
                .emoji-option.selected { background: var(--vocaloid-gradient); box-shadow: 0 0 10px rgba(255,107,157,0.3); }
            `;
            document.head.appendChild(style);
        }

        // 选择Emoji
        function selectEmoji(emoji) {
            document.querySelectorAll('.emoji-option').forEach(el => el.classList.remove('selected'));
            document.querySelector(`[data-emoji="${emoji}"]`).classList.add('selected');
            document.getElementById('wiki-logo-emoji').value = emoji;
            updateLogoPreview();
        }

        // 切换Logo类型
        function toggleLogoType() {
            const useEmoji = document.getElementById('logo-type-emoji').checked;
            document.getElementById('logo-emoji-section').style.display = useEmoji ? 'block' : 'none';
            document.getElementById('logo-image-section').style.display = useEmoji ? 'none' : 'block';
            updateLogoPreview();
        }

        // 更新Logo预览
        function updateLogoPreview() {
            const wikiName = document.getElementById('wiki-name-input').value.trim() || '百科';
            const useEmoji = document.getElementById('logo-type-emoji').checked;
            
            if (useEmoji) {
                const emoji = document.getElementById('wiki-logo-emoji').value || '🎵';
                document.getElementById('logo-preview-icon').innerHTML = `<span style="font-size:2rem;">${emoji}</span>`;
                document.getElementById('logo-preview-icon').style.display = 'inline';
            } else {
                const imageUrl = document.getElementById('wiki-logo-image').value.trim();
                if (imageUrl) {
                    document.getElementById('logo-preview-icon').innerHTML = `<img src="${imageUrl}" style="width:40px;height:40px;object-fit:contain;" onerror="this.parentElement.innerHTML='❌'">`;
                    document.getElementById('logo-preview-icon').style.display = 'inline';
                } else {
                    document.getElementById('logo-preview-icon').innerHTML = '📷';
                }
            }
            document.getElementById('logo-preview-text').textContent = wikiName;
        }

        // 加载百科设置
        async function loadWikiSettings() {
            try {
                const result = await API.getSiteSettings();
                if (result.success && result.data) {
                    const wikiName = result.data.wiki_name || '百科';
                    const homeTitle = result.data.wiki_home_title || '探索 VOCALOID 世界';
                    
                    // 更新表单
                    document.getElementById('wiki-name-input').value = wikiName;
                    document.getElementById('wiki-home-title-input').value = homeTitle;
                    document.getElementById('wiki-desc-input').value = result.data.wiki_description || '';
                    
                    // 保存到全局设置
                    window.WikiSettings = window.WikiSettings || {};
                    window.WikiSettings.wikiName = wikiName;
                    window.WikiSettings.wikiHomeTitle = homeTitle;
                    
                    // 加载Logo设置
                    initEmojiPicker();
                    let logoData = { type: 'emoji', value: '🎵' };
                    if (result.data.wiki_logo) {
                        try {
                            logoData = JSON.parse(result.data.wiki_logo);
                        } catch (e) {
                            logoData = { type: 'emoji', value: result.data.wiki_logo };
                        }
                    }
                    
                    window.WikiSettings.logoData = logoData;
                    
                    if (logoData.type === 'image') {
                        document.getElementById('logo-type-image').checked = true;
                        document.getElementById('wiki-logo-image').value = logoData.value || '';
                        document.getElementById('logo-emoji-section').style.display = 'none';
                        document.getElementById('logo-image-section').style.display = 'block';
                    } else {
                        document.getElementById('logo-type-emoji').checked = true;
                        document.getElementById('wiki-logo-emoji').value = logoData.value || '🎵';
                        document.getElementById('logo-emoji-section').style.display = 'block';
                        document.getElementById('logo-image-section').style.display = 'none';
                        setTimeout(() => {
                            selectEmoji(logoData.value || '🎵');
                        }, 100);
                    }
                    updateLogoPreview();
                    
                    // 更新导航栏的logo
                    const logo = document.querySelector('.logo');
                    if (logo) {
                        let logoContent;
                        if (logoData.type === 'image' && logoData.value) {
                            logoContent = `<img src="${escapeHtml(logoData.value)}" alt="logo" class="logo-image" style="width:32px;height:32px;object-fit:contain;"> <span class="logo-text">${escapeHtml(wikiName)}</span>`;
                        } else {
                            logoContent = `<span class="logo-emoji">${logoData.value || '🎵'}</span> <span class="logo-text">${escapeHtml(wikiName)}</span>`;
                        }
                        logo.innerHTML = logoContent;
                    }
                    
                    // 加载内容体系设置
                    const featuresTitle = result.data.wiki_features_title || '📚 内容体系';
                    document.getElementById('wiki-features-title-input').value = featuresTitle;
                    
                    // 加载功能卡片
                    let features = DEFAULT_FEATURE_CARDS;
                    if (result.data.wiki_features) {
                        try {
                            features = JSON.parse(result.data.wiki_features);
                        } catch (e) {
                            features = DEFAULT_FEATURE_CARDS;
                        }
                    }
                    renderFeatureCards(features);
                }
            } catch (error) {
                console.error('加载百科设置失败:', error);
            }
        }

        // 默认功能卡片数据
        const DEFAULT_FEATURE_CARDS = [
            { icon: '🎤', title: '虚拟歌手档案', description: '收录初音未来、镜音铃/连、巡音流歌、MEIKO、KAITO 等经典角色' },
            { icon: '🎛️', title: 'VOCALOID 技术解析', description: '涵盖 VOCALOID 引擎发展史、软件使用教程、参数调整指南' },
            { icon: '🎵', title: '代表作品收录', description: '整理经典曲目、专辑、PV作品及相关创作者信息' },
            { icon: '🎨', title: 'Piapro 创作者生态', description: '介绍围绕 VOCALOID 形成的庞大创作社区' }
        ];

        // 功能卡片Emoji列表
        const FEATURE_EMOJI_LIST = ['📚', '🎤', '🎧', '🎹', '🎸', '🎺', '🎷', '🎵', '🎶', '🎬', '🎥', '🎨', '🎭', '🎪', '🎯', '⭐', '🌟', '💫', '✨', '🔮', '💡', '🌈', '🏆', '🎊', '🎉'];

        // 渲染功能卡片编辑列表
        function renderFeatureCards(cards) {
            const container = document.getElementById('features-cards-container');
            if (!container) return;
            
            container.innerHTML = cards.map((card, index) => `
                <div class="card" style="margin-bottom:10px;padding:15px;background:var(--bg-tertiary);border-radius:var(--radius);">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                        <span style="font-weight:600;">卡片 ${index + 1}</span>
                        <button type="button" class="btn btn-sm btn-danger" onclick="removeFeatureCard(${index})">删除</button>
                    </div>
                    <div style="display:flex;gap:10px;margin-bottom:10px;">
                        <div style="flex:0 0 100px;">
                            <label style="font-size:0.85rem;color:var(--text-muted);">图标</label>
                            <div class="feature-emoji-picker" data-index="${index}">
                                <select class="form-input" onchange="updateFeatureCard(${index}, 'icon', this.value)" style="padding:8px;">
                                    ${FEATURE_EMOJI_LIST.map(e => `<option value="${e}" ${card.icon === e ? 'selected' : ''}>${e}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                        <div style="flex:1;">
                            <label style="font-size:0.85rem;color:var(--text-muted);">标题</label>
                            <input type="text" class="form-input" value="${escapeHtml(card.title || '')}" 
                                   onchange="updateFeatureCard(${index}, 'title', this.value)" placeholder="卡片标题" style="padding:8px;">
                        </div>
                    </div>
                    <div>
                        <label style="font-size:0.85rem;color:var(--text-muted);">描述</label>
                        <textarea class="form-input" rows="2" 
                                  onchange="updateFeatureCard(${index}, 'description', this.value)" 
                                  placeholder="卡片描述" style="padding:8px;">${escapeHtml(card.description || '')}</textarea>
                    </div>
                </div>
            `).join('');
            
            // 保存当前卡片数据到全局变量
            window.featureCards = cards;
        }

        // 更新功能卡片
        function updateFeatureCard(index, field, value) {
            if (!window.featureCards) window.featureCards = [];
            if (!window.featureCards[index]) window.featureCards[index] = {};
            window.featureCards[index][field] = value;
        }

        // 添加功能卡片
        function addFeatureCard() {
            if (!window.featureCards) window.featureCards = DEFAULT_FEATURE_CARDS.map(c => ({...c}));
            window.featureCards.push({ icon: '📚', title: '新卡片', description: '卡片描述内容' });
            renderFeatureCards(window.featureCards);
        }

        // 删除功能卡片
        function removeFeatureCard(index) {
            if (!window.featureCards) return;
            window.featureCards.splice(index, 1);
            renderFeatureCards(window.featureCards);
        }

        // 保存百科设置
        async function saveWikiSettings(e) {
            e.preventDefault();
            const wikiName = document.getElementById('wiki-name-input').value.trim();
            const homeTitle = document.getElementById('wiki-home-title-input').value.trim();
            const wikiDesc = document.getElementById('wiki-desc-input').value.trim();

            if (!wikiName) {
                showToast('请输入百科名称', 'error');
                return;
            }

            try {
                const nameResult = await API.updateSiteSetting('wiki_name', wikiName);
                const homeTitleResult = await API.updateSiteSetting('wiki_home_title', homeTitle);
                const descResult = await API.updateSiteSetting('wiki_description', wikiDesc);
                
                // 保存Logo设置
                const useEmoji = document.getElementById('logo-type-emoji').checked;
                let logoData;
                if (useEmoji) {
                    logoData = JSON.stringify({ type: 'emoji', value: document.getElementById('wiki-logo-emoji').value });
                } else {
                    logoData = JSON.stringify({ type: 'image', value: document.getElementById('wiki-logo-image').value.trim() });
                }
                const logoResult = await API.updateSiteSetting('wiki_logo', logoData);
                
                // 保存内容体系标题
                const featuresTitle = document.getElementById('wiki-features-title-input').value.trim();
                await API.updateSiteSetting('wiki_features_title', featuresTitle);
                
                // 保存功能卡片
                const featuresCards = window.featureCards || DEFAULT_FEATURE_CARDS;
                const featuresResult = await API.updateSiteSetting('wiki_features', JSON.stringify(featuresCards));
                
                if (nameResult.success) {
                    showToast('百科设置已保存', 'success');
                } else {
                    showToast(nameResult.message || '保存失败', 'error');
                }
            } catch (error) {
                showToast('保存失败', 'error');
            }
        }

        // 加载统计数据
        async function loadStats() {
            try {
                const result = await API.getStats();
                if (result.success && result.data) {
                    document.getElementById('stat-articles').textContent = result.data.articleCount || 0;
                    document.getElementById('stat-users').textContent = result.data.userCount || 0;
                    document.getElementById('stat-active').textContent = result.data.activeUserCount || 0;
                }
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }

        // 加载用户列表
        async function loadUsers() {
            const tbody = document.getElementById('users-tbody');
            tbody.innerHTML = '<tr><td colspan="8"><div class="loading"></div></td></tr>';

            try {
                const result = await API.getAllUsers();
                if (result.success && result.data) {
                    tbody.innerHTML = '';
                    result.data.forEach(user => {
                        // 渲染用户标签
                        let tagsHtml = '';
                        if (user.tags && user.tags.length > 0) {
                            tagsHtml = user.tags.map(tag => 
                                `<span style="padding:2px 8px;border-radius:12px;font-size:0.75rem;background:${tag.color}20;color:${tag.color};margin-right:4px;">${escapeHtml(tag.name)}</span>`
                            ).join('');
                        } else {
                            tagsHtml = '<span style="color:#94a3b8;">无</span>';
                        }
                        
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${user.id}</td>
                            <td>${escapeHtml(user.username)}</td>
                            <td>${escapeHtml(user.nickname || '-')}</td>
                            <td>
                                <select onchange="changeRole(${user.id}, this.value)" class="form-input" style="padding:5px 10px;width:auto;">
                                    <option value="user" ${user.role === 'user' ? 'selected' : ''}>普通用户</option>
                                    <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>管理员</option>
                                </select>
                            </td>
                            <td>
                                <span class="tag ${user.status === 'banned' ? '' : 'tag-primary'}">
                                    ${user.status === 'banned' ? '已封禁' : '正常'}
                                </span>
                            </td>
                            <td>${tagsHtml}</td>
                            <td>
                                <button class="btn btn-sm btn-outline" data-user-id="${user.id}" data-user-name="${escapeHtml(user.nickname || user.username)}" onclick="handleOpenUserTagsModal(this)">授权标签</button>
                            </td>
                            <td>
                                ${user.status === 'banned' 
                                    ? `<button class="btn btn-sm btn-outline" onclick="changeStatus(${user.id}, 'active')">解封</button>`
                                    : `<button class="btn btn-sm btn-danger" onclick="changeStatus(${user.id}, 'banned')">封禁</button>`
                                }
                                <button class="btn btn-sm btn-outline" onclick="window.location.href='user.html?id=${user.id}'">查看</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">加载失败</td></tr>';
                }
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">加载失败</td></tr>';
            }
        }

        // 修改用户角色
        async function changeRole(userId, role) {
            try {
                const result = await API.updateUserRole(userId, role);
                if (result.success) {
                    showToast('角色修改成功', 'success');
                } else {
                    showToast(result.message || '修改失败', 'error');
                    loadUsers();
                }
            } catch (error) {
                showToast('修改失败', 'error');
                loadUsers();
            }
        }

        // 修改用户状态
        async function changeStatus(userId, status) {
            const action = status === 'banned' ? '封禁' : '解封';
            openConfirmModal(`确定要${action}该用户吗？`, async () => {
                try {
                    const result = await API.updateUserStatus(userId, status);
                    if (result.success) {
                        showToast(`用户已${action}`, 'success');
                        loadUsers();
                        loadStats();
                    } else {
                        showToast(result.message || '操作失败', 'error');
                    }
                } catch (error) {
                    showToast('操作失败', 'error');
                }
            });
        }

        // 加载词条列表
        async function loadArticles() {
            const tbody = document.getElementById('articles-tbody');
            tbody.innerHTML = '<tr><td colspan="5"><div class="loading"></div></td></tr>';

            try {
                const result = await API.getArticles({ limit: 50 });
                if (result.success && result.data) {
                    tbody.innerHTML = '';
                    result.data.forEach(article => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${article.ID}</td>
                            <td><a href="article.html?id=${article.ID}">${escapeHtml(article.title)}</a></td>
                            <td>${formatDate(article.create_date)}</td>
                            <td>${article.author_id || '-'}</td>
                            <td>
                                <button class="btn btn-sm btn-outline" onclick="window.location.href='article.html?id=${article.ID}'">查看</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteArticle(${article.ID})">删除</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">暂无词条</td></tr>';
                }
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">加载失败</td></tr>';
            }
        }

        // 删除词条
        async function deleteArticle(articleId) {
            openConfirmModal('确定要删除该词条吗？此操作不可恢复。', async () => {
                try {
                    const result = await API.deleteArticle(articleId);
                    if (result.success) {
                        showToast('词条已删除', 'success');
                        loadArticles();
                        loadStats();
                    } else {
                        showToast(result.message || '删除失败', 'error');
                    }
                } catch (error) {
                    showToast('删除失败', 'error');
                }
            });
        }

        // 加载词条标签列表
        async function loadArticleTags() {
            const container = document.getElementById('article-tags-list');
            container.innerHTML = '<div class="loading"></div>';

            try {
                const result = await API.getArticleTags();
                if (result.success && result.data) {
                    if (result.data.length === 0) {
                        container.innerHTML = '<p style="color:#94a3b8;">暂无词条标签</p>';
                        return;
                    }
                    container.innerHTML = '';
                    result.data.forEach(tag => {
                        const item = document.createElement('div');
                        item.className = 'card';
                        item.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;';
                        item.innerHTML = `
                            <div style="display:flex;align-items:center;gap:15px;">
                                <span class="tag" style="background:${tag.color};color:white;font-size:1rem;padding:8px 16px;">${escapeHtml(tag.name)}</span>
                                <span style="color:#64748b;">${escapeHtml(tag.description || '')}</span>
                            </div>
                            <button class="btn btn-sm btn-danger" onclick="deleteArticleTag(${tag.ID})">删除</button>
                        `;
                        container.appendChild(item);
                    });
                } else {
                    container.innerHTML = '<p style="color:#94a3b8;">加载失败</p>';
                }
            } catch (error) {
                container.innerHTML = '<p style="color:#94a3b8;">加载失败</p>';
            }
        }

        // 创建词条标签
        async function createArticleTag(e) {
            e.preventDefault();
            
            const name = document.getElementById('new-article-tag-name').value.trim();
            const description = document.getElementById('new-article-tag-desc').value.trim();
            const color = document.getElementById('new-article-tag-color').value;

            if (!name) {
                showToast('标签名称不能为空', 'error');
                return;
            }

            try {
                const result = await API.createArticleTag(name, description, color);
                if (result.success) {
                    showToast('词条标签创建成功', 'success');
                    document.getElementById('create-article-tag-form').reset();
                    loadArticleTags();
                } else {
                    showToast(result.message || '创建失败', 'error');
                }
            } catch (error) {
                showToast('创建失败', 'error');
            }
        }

        // 删除词条标签
        async function deleteArticleTag(tagId) {
            openConfirmModal('确定要删除该词条标签吗？', async () => {
                try {
                    const result = await API.deleteArticleTag(tagId);
                    if (result.success) {
                        showToast('词条标签已删除', 'success');
                        loadArticleTags();
                    } else {
                        showToast(result.message || '删除失败', 'error');
                    }
                } catch (error) {
                    showToast('删除失败', 'error');
                }
            });
        }

        // 加载用户标签列表
        async function loadUserTags() {
            const container = document.getElementById('user-tags-list');
            container.innerHTML = '<div class="loading"></div>';

            try {
                const result = await API.getUserTags();
                if (result.success && result.data) {
                    if (result.data.length === 0) {
                        container.innerHTML = '<p style="color:#94a3b8;">暂无用户标签</p>';
                        return;
                    }
                    container.innerHTML = '';
                    result.data.forEach(tag => {
                        const item = document.createElement('div');
                        item.className = 'card';
                        item.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;';
                        item.innerHTML = `
                            <div style="display:flex;align-items:center;gap:15px;">
                                <span class="tag" style="background:${tag.color};color:white;font-size:1rem;padding:8px 16px;">${escapeHtml(tag.name)}</span>
                                <span style="color:#64748b;">${escapeHtml(tag.description || '')}</span>
                            </div>
                            <button class="btn btn-sm btn-danger" onclick="deleteUserTag(${tag.ID})">删除</button>
                        `;
                        container.appendChild(item);
                    });
                } else {
                    container.innerHTML = '<p style="color:#94a3b8;">加载失败</p>';
                }
            } catch (error) {
                container.innerHTML = '<p style="color:#94a3b8;">加载失败</p>';
            }
        }

        // 创建用户标签
        async function createUserTag(e) {
            e.preventDefault();
            
            const name = document.getElementById('new-user-tag-name').value.trim();
            const description = document.getElementById('new-user-tag-desc').value.trim();
            const color = document.getElementById('new-user-tag-color').value;

            if (!name) {
                showToast('标签名称不能为空', 'error');
                return;
            }

            try {
                const result = await API.createUserTag(name, description, color);
                if (result.success) {
                    showToast('用户标签创建成功', 'success');
                    document.getElementById('create-user-tag-form').reset();
                    loadUserTags();
                } else {
                    showToast(result.message || '创建失败', 'error');
                }
            } catch (error) {
                showToast('创建失败', 'error');
            }
        }

        // 删除用户标签
        async function deleteUserTag(tagId) {
            openConfirmModal('确定要删除该用户标签吗？', async () => {
                try {
                    const result = await API.deleteUserTag(tagId);
                    if (result.success) {
                        showToast('用户标签已删除', 'success');
                        loadUserTags();
                    } else {
                        showToast(result.message || '删除失败', 'error');
                    }
                } catch (error) {
                    showToast('删除失败', 'error');
                }
            });
        }

        // 打开用户标签授权模态框（通过data属性）
        async function handleOpenUserTagsModal(button) {
            const userId = parseInt(button.dataset.userId);
            const userName = button.dataset.userName;
            openUserTagsModal(userId, userName);
        }

        // 打开用户标签授权模态框
        async function openUserTagsModal(userId, userName) {
            console.log('Opening user tags modal for user:', userId, userName);
            currentUserId = userId;
            document.getElementById('user-tags-modal-user').textContent = `为用户「${userName}」授权标签`;
            
            try {
                // 获取用户已有标签
                const userTagsResult = await API.getUserTagsById(userId);
                console.log('User tags result:', userTagsResult);
                // 使用小写 id（数据库返回的字段是小写的）
                const userTagIds = userTagsResult.success && userTagsResult.data 
                    ? userTagsResult.data.map(t => t.id || t.ID) 
                    : [];
                
                // 获取所有用户标签
                const allTagsResult = await API.getUserTags();
                console.log('All user tags result:', allTagsResult);
                availableUserTags = allTagsResult.success && allTagsResult.data ? allTagsResult.data : [];
                
                // 渲染复选框
                const container = document.getElementById('user-tags-checkboxes');
                if (availableUserTags.length === 0) {
                    container.innerHTML = '<p style="color:#94a3b8;">暂无用户标签，请先在"用户标签"标签页创建</p>';
                } else {
                    container.innerHTML = availableUserTags.map(tag => {
                        // 兼容大小写 id
                        const tagId = tag.id || tag.ID;
                        return `
                        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:5px;">
                            <input type="checkbox" value="${tagId}" ${userTagIds.includes(tagId) ? 'checked' : ''}>
                            <span style="padding:4px 12px;border-radius:12px;background:${tag.color}20;color:${tag.color};border:1px solid ${tag.color}40;">
                                ${escapeHtml(tag.name)}
                            </span>
                        </label>
                    `}).join('');
                }
                
                document.getElementById('user-tags-modal').classList.add('active');
                console.log('Modal should be visible now');
            } catch (error) {
                console.error('Error loading user tags:', error);
                showToast('加载用户标签失败: ' + error.message, 'error');
            }
        }

        // 关闭用户标签模态框
        function closeUserTagsModal() {
            document.getElementById('user-tags-modal').classList.remove('active');
            currentUserId = null;
        }

        // 保存用户标签授权
        async function saveUserTags() {
            console.log('saveUserTags called, currentUserId:', currentUserId);
            if (!currentUserId) {
                showToast('未选择用户', 'error');
                return;
            }
            
            const checkboxes = document.querySelectorAll('#user-tags-checkboxes input[type="checkbox"]:checked');
            const tagIds = Array.from(checkboxes).map(cb => parseInt(cb.value));
            console.log('Selected tag IDs:', tagIds);
            
            try {
                const result = await API.setUserTags(currentUserId, tagIds);
                console.log('setUserTags result:', result);
                if (result.success) {
                    showToast('用户标签授权成功', 'success');
                    closeUserTagsModal();
                    loadUsers();
                } else {
                    showToast(result.message || '授权失败', 'error');
                }
            } catch (error) {
                console.error('Error saving user tags:', error);
                showToast('授权失败: ' + error.message, 'error');
            }
        }

        // 切换标签
        function switchTab(tabName) {
            document.querySelectorAll('.admin-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.tab === tabName);
            });
            
            document.getElementById('settings-panel').style.display = tabName === 'settings' ? 'block' : 'none';
            document.getElementById('users-panel').style.display = tabName === 'users' ? 'block' : 'none';
            document.getElementById('articles-panel').style.display = tabName === 'articles' ? 'block' : 'none';
            document.getElementById('article-tags-panel').style.display = tabName === 'article-tags' ? 'block' : 'none';
            document.getElementById('user-tags-panel').style.display = tabName === 'user-tags' ? 'block' : 'none';

            if (tabName === 'settings') loadWikiSettings();
            if (tabName === 'users') loadUsers();
            if (tabName === 'articles') loadArticles();
            if (tabName === 'article-tags') loadArticleTags();
            if (tabName === 'user-tags') loadUserTags();
        }

        // 确认模态框
        function openConfirmModal(message, onConfirm) {
            document.getElementById('confirm-message').textContent = message;
            pendingAction = onConfirm;
            document.getElementById('confirm-modal').classList.add('active');
        }

        function closeConfirmModal() {
            document.getElementById('confirm-modal').classList.remove('active');
            pendingAction = null;
        }

        // 登出
        function logout() {
            API.logout().then(() => {
                window.location.href = '/login.html';
            });
        }

        // 显示提示
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast toast-${type}`;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 移动端菜单切换
        function toggleMobileMenu() {
            const navLinks = document.getElementById('nav-links');
            navLinks.classList.toggle('show');
        }

        // HTML转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN');
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initPage();
            loadStats();
            loadWikiSettings();

            // 标签切换
            document.querySelectorAll('.admin-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    switchTab(tab.dataset.tab);
                });
            });

            // 百科设置表单
            document.getElementById('wiki-settings-form').addEventListener('submit', saveWikiSettings);

            // 创建词条标签表单
            document.getElementById('create-article-tag-form').addEventListener('submit', createArticleTag);
            
            // 创建用户标签表单
            document.getElementById('create-user-tag-form').addEventListener('submit', createUserTag);

            // 确认按钮
            document.getElementById('confirm-btn').addEventListener('click', () => {
                if (pendingAction) {
                    pendingAction();
                    closeConfirmModal();
                }
            });
        });
    </script>
</body>
</html>
